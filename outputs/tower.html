function uc(){c.position.set(tg.x+ra*Math.cos(ph)*Math.sin(th),tg.y+ra*Math.sin(ph),tg.z+ra*Math.cos(ph)*Math.cos(th));c.lookAt(tg)}
uc();
var dr=false,px=0,py=0;
r.domElement.addEventListener('pointerdown',function(e){dr=true;px=e.clientX;py=e.clientY;r.domElement.setPointerCapture(e.pointerId)});
r.domElement.addEventListener('pointermove',function(e){if(!dr)return;th-=(e.clientX-px)*0.006;ph=Math.max(0.02,Math.min(1.4,ph+(e.clientY-py)*0.006));px=e.clientX;py=e.clientY;uc()});
r.domElement.addEventListener('pointerup',function(){dr=false});
r.domElement.addEventListener('wheel',function(e){ra=Math.max(14,Math.min(143,ra+e.deltaY*0.143));uc();e.preventDefault()},{passive:false});
window.addEventListener('resize',function(){c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
window.sm=function(mode){
  document.querySelectorAll('.b').forEach(function(b){b.classList.remove('on')});
  event.target.classList.add('on');
  fs.forEach(function(m){
    if(mode==='wire'){m.visible=false}
    else if(mode==='xray'){m.visible=true;m.material.opacity=0.06}
    else{m.visible=true;m.material.opacity=m.userData.op}
    m.material.needsUpdate=true;
  });
  es.forEach(function(w){w.visible=true;w.material.opacity=mode==='wire'?0.8:0.6;w.material.needsUpdate=true});
};
window.sc=function(v){cl.constant=v*0.618};
(function loop(){requestAnimationFrame(loop);r.render(s,c)})();
</script></body></html>
